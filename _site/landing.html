<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RSS Lobster — RSS Lobster</title>
  <meta name="description" content="">
  <meta name="author" content="Hector Zarate">
  <link rel="alternate" type="application/rss+xml" title="RSS Lobster" href="/feed.xml">
  <link rel="alternate" type="application/feed+json" title="RSS Lobster" href="/feed.json">
  <style>:root {
  --font-body: Charter, "Bitstream Charter", "Sitka Text", Cambria, serif;
  --font-heading: system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-size: 18px;
  --line-height: 1.6;
  --max-width: 640px;
  --color-text: #222222;
  --color-bg: #FFFFF0;
  --color-accent: #0000EE;
  --color-link: #0000EE;
  --color-visited: #551A8B;
  --color-muted: #666666;
  --color-border: #CCCCCC;
  --border-radius: 0px;
  --shiki-foreground: #383a42;
  --shiki-background: color-mix(in srgb, #222222 5%, transparent);
  --shiki-token-constant: #986801;
  --shiki-token-string: #50a14f;
  --shiki-token-comment: #a0a1a7;
  --shiki-token-keyword: #a626a4;
  --shiki-token-parameter: #383a42;
  --shiki-token-function: #4078f2;
  --shiki-token-string-expression: #50a14f;
  --shiki-token-punctuation: #383a42;
  --shiki-token-link: #0000EE;
}

/*
 * rsslobster — retro web, modern rigor.
 *
 * This stylesheet is the product. Every rule earns its place.
 * No framework. No utility classes. Just considered CSS for
 * pages that are meant to be read.
 */

/* === Reset === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* === Document === */
html {
  font-size: var(--font-size);
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  hanging-punctuation: first last;
}

body {
  font-family: var(--font-body);
  line-height: var(--line-height);
  color: var(--color-text);
  background: var(--color-bg);
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 2rem 1rem;
  overflow-wrap: break-word;
  word-break: break-word;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* === Typography === */
h1, h2, h3 {
  font-family: var(--font-heading);
  line-height: 1.2;
  margin-top: 1.5em;
  margin-bottom: 0.5em;
  text-wrap: balance;
}

h1 { font-size: 1.8rem; letter-spacing: -0.02em; }
h2 { font-size: 1.4rem; letter-spacing: -0.01em; }
h3 { font-size: 1.15rem; }

p {
  margin-bottom: 1em;
  text-wrap: pretty;
}

/* === Links — the soul of the web === */
a {
  color: var(--color-link);
  text-decoration: underline;
  text-underline-offset: 0.15em;
  text-decoration-thickness: 1px;
}

a:visited {
  color: var(--color-visited);
}

a:hover {
  text-decoration-thickness: 2px;
}

a:focus-visible {
  outline: 2px solid var(--color-link);
  outline-offset: 2px;
  border-radius: var(--border-radius);
}

/* === Horizontal rule — the great separator === */
hr {
  border: none;
  border-top: 1px solid var(--color-border);
  margin: 2rem 0;
}

/* === Images — responsive, no-nonsense === */
img {
  max-width: 100%;
  height: auto;
  display: block;
  border-radius: var(--border-radius);
}

/* === Blockquotes — indented, distinct === */
blockquote {
  border-left: 3px solid var(--color-border);
  padding-left: 1em;
  margin: 1em 0;
  color: var(--color-muted);
  font-style: italic;
}

/* === Code — monospace stands out === */
code {
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
  font-size: 0.9em;
  background: var(--color-border);
  background: color-mix(in srgb, var(--color-text) 8%, transparent);
  padding: 0.1em 0.3em;
  border-radius: var(--border-radius);
}

pre {
  overflow-x: auto;
  padding: 1em;
  margin: 1em 0;
  background: var(--color-border);
  background: color-mix(in srgb, var(--color-text) 5%, transparent);
  border: 1px solid var(--color-border);
  border-radius: var(--border-radius);
}

pre code {
  background: none;
  padding: 0;
}

/* === Shiki code blocks — override pre defaults with shiki vars === */
pre.shiki {
  background: var(--shiki-background) !important;
  border: 1px solid var(--color-border);
}

/* === Math (MathML) === */
math {
  font-size: 1.1em;
}

math[display="block"] {
  display: block;
  text-align: center;
  margin: 1em 0;
  overflow-x: auto;
}

/* === Lists — properly indented === */
ul, ol {
  padding-left: 1.5em;
  margin-bottom: 1em;
}

li { margin-bottom: 0.25em; }

li::marker {
  color: var(--color-muted);
}

/* === Article — the atomic unit of a feed === */
article {
  margin-bottom: 2.5rem;
  padding-bottom: 2.5rem;
  border-bottom: 1px solid var(--color-border);
}

article:last-child {
  border-bottom: none;
}

/* === Meta — timestamps, bylines === */
time, .meta {
  color: var(--color-muted);
  font-size: 0.85rem;
  font-family: var(--font-heading);
  letter-spacing: 0.02em;
}

/* === Tags — small, quiet, clickable === */
.tag {
  display: inline-block;
  padding: 0.2rem 0.5rem;
  font-size: 0.75rem;
  font-family: var(--font-heading);
  border: 1px solid var(--color-border);
  border-radius: var(--border-radius);
  color: var(--color-muted);
  text-decoration: none;
  margin-right: 0.25rem;
  margin-top: 0.25rem;
}

/* === Carousel — horizontal scroll, snap === */
.carousel {
  display: flex;
  gap: 0.75rem;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 0.75rem;
  margin: 1rem 0;
}

.carousel img {
  scroll-snap-align: start;
  flex-shrink: 0;
  width: 80vw;
  max-width: 480px;
}

/* === Link card — the bookmark === */
.link-card {
  border: 1px solid var(--color-border);
  border-radius: var(--border-radius);
  padding: 1rem;
  text-decoration: none;
  display: block;
  color: inherit;
  margin: 1rem 0;
}

.link-card:visited { color: inherit; }

.link-card:hover, .link-card:focus-visible {
  border-color: var(--color-link);
}

.link-card h3 {
  margin-top: 0;
  margin-bottom: 0.25em;
  color: var(--color-link);
  font-size: 1.1rem;
}

.link-card p {
  color: var(--color-muted);
  margin-bottom: 0;
  font-size: 0.9rem;
}

/* === Header / nav — minimal, functional === */
header {
  margin-bottom: 2rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--color-border);
}

header h1 {
  margin-top: 0;
  margin-bottom: 0.25em;
}

header p {
  color: var(--color-muted);
  margin-bottom: 0;
}

nav a {
  font-family: var(--font-heading);
  font-weight: 700;
  text-decoration: none;
  color: var(--color-text);
  font-size: 1.1rem;
}

nav a:hover {
  text-decoration: underline;
  text-decoration-thickness: 2px;
  text-underline-offset: 0.15em;
}

nav a:visited { color: var(--color-text); }

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.header-rss {
  font-family: var(--font-heading);
  font-size: 0.85rem;
  color: var(--color-muted);
  text-decoration: none;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
}

.header-rss:hover {
  color: var(--color-link);
}

.header-rss:visited {
  color: var(--color-muted);
}

/* === Footer — site-level, quiet === */
footer {
  margin-top: 0.75rem;
}

.site-footer {
  margin-top: 2rem;
  padding-top: 1rem;
  border-top: 1px solid var(--color-border);
  font-family: var(--font-heading);
  font-size: 0.85rem;
  color: var(--color-muted);
}

.site-footer a {
  color: var(--color-muted);
  text-decoration: none;
}

.site-footer a:hover {
  color: var(--color-link);
  text-decoration: underline;
}

.site-footer-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.site-footer-powered {
  margin-top: 0.5rem;
  font-size: 0.75rem;
}

/* === Selection — intentional === */
::selection {
  background: var(--color-link);
  color: var(--color-bg);
}

/* === Accessibility: skip link === */
.skip-link {
  position: absolute;
  top: -100%;
  left: 0;
  padding: 0.5rem 1rem;
  background: var(--color-link);
  color: var(--color-bg);
  z-index: 100;
  text-decoration: none;
  font-family: var(--font-heading);
}

.skip-link:focus {
  top: 0;
}

/* === Touch targets — minimum 44x44px (WCAG 2.5.8) === */
nav a, button, .tag {
  min-height: 44px;
  display: inline-flex;
  align-items: center;
}

/* === Responsive === */
@media (max-width: 480px) {
  html { font-size: calc(var(--font-size) - 1px); }
  body { padding: 1.5rem 0.75rem; }
  h1 { font-size: 1.5rem; }
}

/* === Reduced motion === */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* === Print — because retro web people print things === */
@media print {
  body {
    max-width: 100%;
    padding: 0;
    color: #000;
    background: #fff;
  }
  a { color: #000; }
  a[href]::after { content: " (" attr(href) ")"; font-size: 0.8em; }
  .skip-link, nav { display: none; }
  article { border-bottom: none; page-break-inside: avoid; }
}


/* Landing page overrides */
article > h1 {
  font-size: 2.5rem;
  letter-spacing: -0.03em;
  margin-bottom: 0.25em;
}

article > div > p:first-child {
  font-size: 1.25rem;
  line-height: 1.6;
  color: var(--color-muted, #666);
  margin-bottom: 2rem;
}

article > div > h2 {
  margin-top: 3rem;
  margin-bottom: 1rem;
}

/* Make the install block stand out */
article > div > h2:first-of-type + pre {
  font-size: 1.1rem;
  padding: 1.5rem;
  border-radius: 8px;
}

/* Table styling */
table {
  margin: 1.5rem 0;
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 0.6rem 1rem;
  text-align: left;
  border: 1px solid var(--color-border, #ccc);
}

th {
  background: color-mix(in srgb, var(--color-text, #222) 5%, transparent);
  font-weight: 600;
}

tr:hover {
  background: color-mix(in srgb, var(--color-text, #222) 3%, transparent);
}

/* Footer spacing */
article {
  padding-bottom: 2rem;
}
</style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header>
    <nav><a href="/">RSS Lobster</a></nav>
  </header>
  <main id="main">
    <article>
      <h1>RSS Lobster</h1>
      <div></div>
    </article>
  </main>
</body>
</html>
